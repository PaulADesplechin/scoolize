<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-labelledby="scoolize-logo-title">
  <title id="scoolize-logo-title">Scoolize</title>

  <!-- Symbole : toque universitaire stylisée -->
  <g transform="translate(8, 12)" fill="#4263eb" stroke="none">
    <!-- Mortarboard (losange) -->
    <path d="M 20 0 L 38 10 L 20 20 L 2 10 Z"/>
    <!-- Tige et bord -->
    <path d="M 30 13 L 30 24 C 30 26 28 28 26 28 L 20 28"
          fill="none" stroke="#4263eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Pampille -->
    <circle cx="20" cy="32" r="2.5"/>
  </g>

  <!-- Wordmark -->
  <text x="60" y="42"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="700" letter-spacing="-0.5"
        fill="#0a0a0a">Scoolize</text>
</svg>
