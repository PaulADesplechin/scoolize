<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scoolize — Predict · Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#4263eb',muted:'#f4f4f5',border:'#e4e4e7'}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui,sans-serif}</style>
</head>
<body class="bg-white text-zinc-900">
  <header class="sticky top-0 z-40 border-b border-border bg-white/80 backdrop-blur">
    <div class="mx-auto flex h-14 max-w-6xl items-center justify-between px-4">
      <div class="flex items-center gap-2 font-semibold">
        <svg width="20" height="20" viewBox="0 0 48 48"><path d="M 24 8 L 42 18 L 24 28 L 6 18 Z" fill="#4263eb"/><circle cx="24" cy="38" r="2.5" fill="#4263eb"/></svg>
        <span>Scoolize</span>
      </div>
      <nav class="flex items-center gap-1 text-sm">
        <a class="rounded-md px-3 py-1.5 text-zinc-500">Accueil</a>
        <a class="rounded-md px-3 py-1.5 text-zinc-500">Prepare · Écoles</a>
        <a class="rounded-md bg-muted px-3 py-1.5 font-medium">Predict · Étudiants</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-2xl px-4 py-12 space-y-6">
    <div class="text-center space-y-1">
      <h1 class="text-2xl font-bold">Vérifiez vos notes</h1>
      <p class="text-zinc-500">Notes extraites par OCR — corrigez si besoin avant de valider.</p>
    </div>

    <div class="rounded-xl border border-border p-6 space-y-3">
      <div>
        <h2 class="font-semibold">Mes moyennes</h2>
        <p class="text-sm text-zinc-500">La validation humaine reste indispensable.</p>
      </div>

      <div class="space-y-2">
        <!-- ligne 1 -->
        <div class="flex items-center gap-2">
          <select class="h-9 flex-1 rounded-lg border border-border px-3 text-sm bg-white">
            <option>Mathématiques</option>
          </select>
          <input class="h-9 w-24 rounded-lg border border-border px-3 text-sm" value="18.0">
          <button class="h-9 w-9 rounded-lg text-zinc-500 hover:bg-muted">🗑️</button>
        </div>
        <div class="flex items-center gap-2">
          <select class="h-9 flex-1 rounded-lg border border-border px-3 text-sm bg-white"><option>Physique-Chimie</option></select>
          <input class="h-9 w-24 rounded-lg border border-border px-3 text-sm" value="17.0">
          <button class="h-9 w-9 rounded-lg text-zinc-500 hover:bg-muted">🗑️</button>
        </div>
        <div class="flex items-center gap-2">
          <select class="h-9 flex-1 rounded-lg border border-border px-3 text-sm bg-white"><option>NSI</option></select>
          <input class="h-9 w-24 rounded-lg border border-border px-3 text-sm" value="16.5">
          <button class="h-9 w-9 rounded-lg text-zinc-500 hover:bg-muted">🗑️</button>
        </div>
        <div class="flex items-center gap-2">
          <select class="h-9 flex-1 rounded-lg border border-border px-3 text-sm bg-white"><option>Français</option></select>
          <input class="h-9 w-24 rounded-lg border border-border px-3 text-sm" value="14.0">
          <button class="h-9 w-9 rounded-lg text-zinc-500 hover:bg-muted">🗑️</button>
        </div>
        <div class="flex items-center gap-2">
          <select class="h-9 flex-1 rounded-lg border border-border px-3 text-sm bg-white"><option>LV1 Anglais</option></select>
          <input class="h-9 w-24 rounded-lg border border-border px-3 text-sm" value="15.0">
          <button class="h-9 w-9 rounded-lg text-zinc-500 hover:bg-muted">🗑️</button>
        </div>
      </div>

      <button class="rounded-lg border border-border px-3 py-1.5 text-sm font-medium hover:bg-muted">+ Ajouter une matière</button>
    </div>

    <div class="flex justify-end">
      <button class="rounded-lg bg-primary px-4 py-2 font-medium text-white inline-flex items-center gap-2">
        Valider et voir mes formations →
      </button>
    </div>
  </main>
</body>
</html>
