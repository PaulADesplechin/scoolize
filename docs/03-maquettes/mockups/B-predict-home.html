<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scoolize — Predict · Profil étudiant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#4263eb',muted:'#f4f4f5',border:'#e4e4e7'}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui,sans-serif}</style>
</head>
<body class="bg-white text-zinc-900">
  <header class="sticky top-0 z-40 border-b border-border bg-white/80 backdrop-blur">
    <div class="mx-auto flex h-14 max-w-6xl items-center justify-between px-4">
      <div class="flex items-center gap-2 font-semibold">
        <svg width="20" height="20" viewBox="0 0 48 48"><path d="M 24 8 L 42 18 L 24 28 L 6 18 Z" fill="#4263eb"/><circle cx="24" cy="38" r="2.5" fill="#4263eb"/></svg>
        <span>Scoolize</span>
      </div>
      <nav class="flex items-center gap-1 text-sm">
        <a class="rounded-md px-3 py-1.5 text-zinc-500">Accueil</a>
        <a class="rounded-md px-3 py-1.5 text-zinc-500">Prepare · Écoles</a>
        <a class="rounded-md bg-muted px-3 py-1.5 font-medium">Predict · Étudiants</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-xl px-4 py-12 space-y-6">
    <div class="text-center space-y-2">
      <div class="mx-auto text-primary text-3xl">🎓</div>
      <h1 class="text-2xl font-bold">Créez votre profil étudiant</h1>
      <p class="text-zinc-500">Quelques infos pour démarrer, puis on lit votre bulletin.</p>
    </div>

    <div class="rounded-xl border border-border p-6 space-y-4">
      <div>
        <h2 class="font-semibold">Mon profil</h2>
        <p class="text-sm text-zinc-500">Vos données restent sur cette démo.</p>
      </div>

      <form class="space-y-4">
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Prénom</label>
            <input class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="Léa">
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Nom</label>
            <input class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="Martin">
          </div>
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium">Email</label>
          <input type="email" class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="lea.martin@exemple.fr">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium">Mot de passe</label>
          <input type="password" class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="6 caractères minimum">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium">Lycée</label>
          <select class="h-9 w-full rounded-lg border border-border px-3 text-sm bg-white">
            <option>— Sélectionnez votre lycée —</option>
            <option>Lycée Louis-le-Grand (Paris)</option>
            <option>Lycée Henri-IV (Paris)</option>
            <option>Lycée du Parc (Lyon)</option>
          </select>
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium">Filière / spécialités</label>
          <input class="h-9 w-full rounded-lg border border-border px-3 text-sm" value="Générale — spé Mathématiques, Physique-Chimie">
        </div>
        <button class="w-full rounded-lg bg-primary px-4 py-2 font-medium text-white">
          Créer mon profil et continuer
        </button>
      </form>
    </div>
  </main>
</body>
</html>
