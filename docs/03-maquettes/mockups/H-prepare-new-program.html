<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scoolize — Prepare · Nouvelle formation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#4263eb',muted:'#f4f4f5',border:'#e4e4e7'}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui,sans-serif}</style>
</head>
<body class="bg-white text-zinc-900">
  <header class="sticky top-0 z-40 border-b border-border bg-white/80 backdrop-blur">
    <div class="mx-auto flex h-14 max-w-6xl items-center justify-between px-4">
      <div class="flex items-center gap-2 font-semibold">
        <svg width="20" height="20" viewBox="0 0 48 48"><path d="M 24 8 L 42 18 L 24 28 L 6 18 Z" fill="#4263eb"/><circle cx="24" cy="38" r="2.5" fill="#4263eb"/></svg>
        <span>Scoolize</span>
      </div>
      <nav class="flex items-center gap-1 text-sm">
        <a class="rounded-md px-3 py-1.5 text-zinc-500">Accueil</a>
        <a class="rounded-md bg-muted px-3 py-1.5 font-medium">Prepare · Écoles</a>
        <a class="rounded-md px-3 py-1.5 text-zinc-500">Predict · Étudiants</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-2xl px-4 py-8 space-y-6">
    <a class="inline-flex items-center gap-1 text-sm text-zinc-500 hover:text-zinc-900">← Retour au tableau de bord</a>

    <div class="rounded-xl border border-border p-6 space-y-5">
      <div>
        <h2 class="text-xl font-semibold">Nouvelle formation</h2>
        <p class="text-sm text-zinc-500">Déclarez les critères d'admission et les matières clés pour le matching.</p>
      </div>

      <form class="space-y-4">
        <div class="space-y-1.5">
          <label class="text-sm font-medium">Intitulé de la formation *</label>
          <input class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="CPGE MPSI, Licence Informatique…">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium">Établissement *</label>
          <input class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="Lycée Louis-le-Grand, Université Paris Cité…">
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Type</label>
            <select class="h-9 w-full rounded-lg border border-border px-3 text-sm bg-white">
              <option>Sélective</option><option>Non-sélective</option>
            </select>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Domaine</label>
            <select class="h-9 w-full rounded-lg border border-border px-3 text-sm bg-white">
              <option>Sciences</option><option>Informatique</option><option>Lettres</option>
            </select>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Ville</label>
            <input class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="Paris">
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Région</label>
            <select class="h-9 w-full rounded-lg border border-border px-3 text-sm bg-white">
              <option>Île-de-France</option><option>Auvergne-Rhône-Alpes</option>
            </select>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Capacité (places)</label>
            <input type="number" class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="120">
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium">Taux d'admission (%)</label>
            <input type="number" class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="15">
          </div>
          <div class="space-y-1.5 sm:col-span-2">
            <label class="text-sm font-medium">Moyenne minimale indicative (/20)</label>
            <input type="number" step="0.5" class="h-9 w-full rounded-lg border border-border px-3 text-sm" placeholder="14">
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label class="text-sm font-medium">Matières clés (pondérées)</label>
            <button type="button" class="rounded-lg border border-border px-3 py-1 text-xs font-medium hover:bg-muted">+ Ajouter</button>
          </div>
          <p class="text-xs text-zinc-500">Le poids reflète l'importance de la matière (les poids sont normalisés par l'algorithme).</p>
          <div class="flex items-center gap-2">
            <select class="h-9 w-full rounded-lg border border-border px-3 text-sm bg-white"><option>Mathématiques</option></select>
            <input type="number" class="h-9 w-24 rounded-lg border border-border px-3 text-sm" value="0.5">
            <button type="button" class="h-9 w-9 rounded-lg text-zinc-500 hover:bg-muted">🗑️</button>
          </div>
          <div class="flex items-center gap-2">
            <select class="h-9 w-full rounded-lg border border-border px-3 text-sm bg-white"><option>Physique-Chimie</option></select>
            <input type="number" class="h-9 w-24 rounded-lg border border-border px-3 text-sm" value="0.3">
            <button type="button" class="h-9 w-9 rounded-lg text-zinc-500 hover:bg-muted">🗑️</button>
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button type="button" class="rounded-lg border border-border px-4 py-2 text-sm font-medium hover:bg-muted">Annuler</button>
          <button type="submit" class="rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white">Créer la formation</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
